# Cloudflare Tunnel Configuration
#
# This uses a WILDCARD approach: all subdomains route to Traefik,
# which handles per-app routing via Docker labels. This means deploying
# a new app requires NO changes to tunnel config — just add a container
# with the right Traefik labels and it's publicly accessible.
#
# If using token-based setup (recommended), configure the wildcard
# in the Cloudflare Zero Trust dashboard instead of this file.
# See: docs/runbooks/cloudflare-tunnel-setup.md

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Wildcard: ALL subdomains route to Traefik
  # Traefik routes based on Host header to the correct container
  - hostname: "*.green-cloud.uk"
    service: http://greencloud-traefik:80

  # Root domain (landing page)
  - hostname: green-cloud.uk
    service: http://greencloud-traefik:80

  # Catch-all: return 404 for unknown hostnames
  - service: http_status:404
