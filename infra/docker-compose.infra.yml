services:
  registry:
    image: registry:2
    container_name: greencloud-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - infra-net
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:5000/v2/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  greencloud-api:
    container_name: greencloud-api
    build:
      context: ../services/greencloud-api
    restart: unless-stopped
    environment:
      GREENCLOUD_REGISTRY_HOST: greencloud-registry:5000
      GREENCLOUD_GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-changeme}
      GREENCLOUD_BUILD_PLATFORM: ${BUILD_PLATFORM:-linux/amd64}
      GREENCLOUD_DATABASE_URL: sqlite:///./data/greencloud.db
    volumes:
      - greencloud-api-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace:ro
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - infra-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.greencloud-api.rule=Host(`api.${DOMAIN:-localhost}`)"
      - "traefik.http.services.greencloud-api.loadbalancer.server.port=8000"

  greencloud-agent:
    container_name: greencloud-agent
    build:
      context: ../services/agent
    restart: unless-stopped
    environment:
      AGENT_REGISTRY_HOST: greencloud-registry:5000
      AGENT_GREENCLOUD_API_URL: http://greencloud-api:8000
      AGENT_COMPOSE_PROJECT_DIR: /infra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../infra:/infra:ro
    ports:
      - "8001:8000"
    depends_on:
      registry:
        condition: service_healthy
    networks:
      - infra-net

  # --- Carbon Engine ---

  carbon-engine:
    container_name: greencloud-carbon
    build:
      context: ../services/carbon-engine
    restart: unless-stopped
    environment:
      CARBON_ELECTRICITY_MAPS_API_KEY: ${ELECTRICITY_MAPS_API_KEY:-}
      CARBON_ELECTRICITY_MAPS_ZONE: ${CARBON_ZONE:-GB}
      CARBON_CARBON_THRESHOLD_LOW: ${CARBON_THRESHOLD_LOW:-100}
      CARBON_CARBON_THRESHOLD_HIGH: ${CARBON_THRESHOLD_HIGH:-300}
      CARBON_PI_IDLE_WATTS: ${PI_IDLE_WATTS:-4}
      CARBON_PI_MAX_WATTS: ${PI_MAX_WATTS:-12}
    volumes:
      - carbon-data:/app/data
    ports:
      - "8002:8000"
    networks:
      - infra-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.carbon.rule=Host(`carbon.${DOMAIN:-localhost}`)"
      - "traefik.http.services.carbon.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- Landing Page ---

  landing:
    container_name: greencloud-landing
    build:
      context: ../services/app/landing
    restart: unless-stopped
    networks:
      - infra-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

  # --- Reverse Proxy ---

  traefik:
    image: traefik:v2.11
    container_name: greencloud-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - infra-net
      - prod-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"

  # --- Cloudflare Tunnel (disabled by default) ---
  # Uncomment or set CLOUDFLARE_TUNNEL_TOKEN in .env to enable

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: greencloud-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - infra-net
    depends_on:
      - traefik
    profiles:
      - tunnel

  # --- Observability Stack ---

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: greencloud-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - infra-net
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: greencloud-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    networks:
      - infra-net
    ports:
      - "9100:9100"

  loki:
    image: grafana/loki:3.1.0
    container_name: greencloud-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - infra-net
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  promtail:
    image: grafana/promtail:3.1.0
    container_name: greencloud-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - infra-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: greencloud-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - infra-net
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-localhost}`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  registry-data:
  greencloud-api-data:
  carbon-data:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  infra-net:
    name: greencloud-infra
  prod-net:
    name: greencloud-prod
