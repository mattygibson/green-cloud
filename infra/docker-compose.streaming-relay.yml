# ---------------------------------------------------------------
# Streaming Relay — Neko Virtual Browser (Disney+ & more)
#
# Runs a Chromium browser in a container, streamed via WebRTC.
# Access from any device (including older iPads) via web browser.
#
# Usage:
#   set DOMAIN=green-cloud.uk
#   docker compose -f docker-compose.streaming-relay.yml up -d
#
# Requires:
#   - greencloud-prod network (created by docker-compose.infra.yml)
#   - Traefik running (from docker-compose.infra.yml)
#   - DOMAIN env var set (defaults to localhost if unset)
#   - UDP ports 52000-52100 open for WebRTC media
# ---------------------------------------------------------------

services:
  streaming-relay:
    image: ghcr.io/m1k1o/neko/chromium:latest
    container_name: greencloud-streaming-relay
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      # WebRTC UDP ports for media streaming
      - "${NEKO_UDP_START:-52000}-${NEKO_UDP_END:-52100}:${NEKO_UDP_START:-52000}-${NEKO_UDP_END:-52100}/udp"
    volumes:
      # Persist Chromium profile (stays logged into Disney+, etc.)
      - streaming-relay-profile:/home/neko/.config/chromium
    environment:
      # Display resolution — 1080p at 30fps for smooth video
      NEKO_DESKTOP_SCREEN: "${NEKO_SCREEN:-1920x1080@30}"
      # Authentication — single admin user (you) + no guest access
      NEKO_MEMBER_MULTIUSER_USER_PASSWORD: "${NEKO_USER_PASSWORD:-changeme}"
      NEKO_MEMBER_MULTIUSER_ADMIN_PASSWORD: "${NEKO_ADMIN_PASSWORD:-changeme}"
      # WebRTC configuration
      NEKO_WEBRTC_EPR: "${NEKO_UDP_START:-52000}-${NEKO_UDP_END:-52100}"
      NEKO_WEBRTC_ICELITE: "1"
      NEKO_WEBRTC_NAT1TO1: "${NEKO_NAT_IP:-}"
    networks:
      - greencloud-prod
    mem_limit: ${NEKO_MEM_LIMIT:-2g}
    cpus: ${NEKO_CPUS:-2.0}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=greencloud-prod"
      - "traefik.http.routers.streaming-relay.rule=Host(`streaming.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.streaming-relay.entrypoints=web"
      - "traefik.http.services.streaming-relay.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  streaming-relay-profile:

networks:
  greencloud-prod:
    name: greencloud-prod
    external: true
