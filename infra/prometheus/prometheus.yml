global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['greencloud-traefik:8082']

  # GreenCloud API metrics
  - job_name: 'greencloud-api'
    static_configs:
      - targets: ['greencloud-api:8000']
    metrics_path: /metrics

  # Agent metrics
  - job_name: 'agent'
    static_configs:
      - targets: ['greencloud-agent:8000']
    metrics_path: /metrics

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['greencloud-node-exporter:9100']

  # Carbon engine metrics (added in Task 8)
  - job_name: 'carbon'
    static_configs:
      - targets: ['carbon-engine:8000']
    metrics_path: /metrics
