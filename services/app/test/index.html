<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenCloud - Deployment Test</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0fdf4;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #bbf7d0;
        }
        h1 { color: #16a34a; margin-bottom: 0.5rem; }
        p { color: #6b7280; font-size: 1.1rem; }
        .badge {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.25rem 0.75rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World</h1>
        <p>Images are working!</p>
        <span class="badge">Deployed via GreenCloud Pipeline</span>
    </div>
</body>
</html>
